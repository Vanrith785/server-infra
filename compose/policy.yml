networks:
  production:
    external: true
    name: production
services:
  policy:
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5175"
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    image: node:22-alpine
    networks:
    - production
    ports:
    - 5175:5175
    volumes:
    - ./:/app
    - policy_node_modules:/app/node_modules
    working_dir: /app
volumes:
  policy_node_modules: null
