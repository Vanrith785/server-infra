networks:
  production:
    external: true
    name: production
services:
  backend:
    build: .
    container_name: attendance_backend
    depends_on:
    - mongodb
    environment:
      JWT_SECRET: your-secret-key-change-this-in-production
      MONGODB_DATABASE: attendance_db
      MONGODB_URI: mongodb://mongodb:27017
    networks:
    - production
    ports:
    - 8009:80
    volumes:
    - .:/var/www/html
    - ./uploads:/var/www/html/public/uploads
  mongodb:
    container_name: attendance_mongodb
    environment:
      MONGO_INITDB_DATABASE: attendance_db
    image: mongo:8.0
    networks:
    - production
    ports:
    - 27019:27017
    volumes:
    - mongodb_data:/data/db
volumes:
  mongodb_data: null
